# pnpm 11 settings home (the package.json "pnpm" field is no longer read).
# Allow these native deps to run their install/build scripts:
#   nx            - native file-hashing + daemon bindings (Nx task runner)
#   sharp         - Next.js image optimization (native libvips)
#   unrs-resolver - native resolver used by eslint-plugin-import / eslint-config-next
allowBuilds:
  nx: true
  sharp: true
  unrs-resolver: true

# pnpm 11's minimumReleaseAge guard blocks freshly-published packages. ESLint 10
# needs @typescript-eslint 8.63 (first release peering eslint ^10), which is new
# enough to trip it — allowlist exactly those packages so CI/Vercel can install.
minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.63.0'
  - '@typescript-eslint/parser@8.63.0'
  - '@typescript-eslint/project-service@8.63.0'
  - '@typescript-eslint/scope-manager@8.63.0'
  - '@typescript-eslint/tsconfig-utils@8.63.0'
  - '@typescript-eslint/type-utils@8.63.0'
  - '@typescript-eslint/types@8.63.0'
  - '@typescript-eslint/typescript-estree@8.63.0'
  - '@typescript-eslint/utils@8.63.0'
  - '@typescript-eslint/visitor-keys@8.63.0'

# Security overrides — pull vulnerable TRANSITIVE deps up to their patched
# versions (GitHub Dependabot). All are deep transitive, none are direct deps.
#   lodash    4.17.21 -> 4.18.x  code injection in _.template + prototype pollution  (via @ant-design/charts)
#   d3-color  1.4.1   -> 3.1.0   ReDoS                                               (via @ant-design/charts)
#   postcss   8.4.31  -> 8.5.x   XSS via unescaped </style>                          (via next)
#   js-yaml   3.13.1  -> 3.15.0  DoS + prototype pollution (dev-only, scoped to 3.x) (via jest coverage)
#   brace-expansion 1.1.11 -> 1.1.x  ReDoS (CVE-2025-5889, scoped to 1.x)            (deep transitive)
overrides:
  lodash: '^4.18.0'
  d3-color: '^3.1.0'
  postcss: '^8.5.10'
  js-yaml@3: '3.15.0'
  brace-expansion@1: '^1.1.12'
